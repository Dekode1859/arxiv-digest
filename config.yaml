# arxiv-digest configuration

# Categories to search (comma-separated)
# Default to cs.AI (AI) and cs.CL (Computation and Language) for agent/LLM focus
categories: cs.AI, cs.CL

# Max papers to fetch per run
max_papers: 10

# Output filename pattern (use {date} for date)
output_filename: "arxiv-digest-{date}.md"

# SilverBullet space path (auto-copy to SilverBullet if set)
silverbullet_space: /var/lib/docker/volumes/silverbullet_silverbullet_space/_data

# MkDocs docs directory
mkdocs_docs_dir: /root/.openclaw/workspace/arxiv-digest/docs

# LLM Configuration
llm:
  # Ollama model to use
  model: "minimax-m2.5:cloud"
  
  # Temperature for summarization (0 = factual, 0.7 = creative)
  temperature: 0.3

# Focus areas - only papers matching these will be included in final digest
# Papers that don't match will be filtered out
focus_areas:
  - agents
  - llms
  - fine_tuning
  - benchmarking
  - evaluation
  - reasoning
  - multi_agent
  - agentic
  - autonomous
  - tool_use
  - code_generation
  - reasoning

# Also include papers from these arXiv categories
filter_categories: cs.AI, cs.CL

# Main categories (extensible)
main_categories:
  - architecture
  - benchmark
  - method
  - dataset
  - application
  - theory
  - survey
